server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        # First try the file exactly as is, then with .html extension, then as a directory
        # Finally fallback to index.html
        try_files $uri $uri.html $uri/ /index.html;
    }

    # API Proxy
    location /api/ {
        set $backend_host backend;
        # Remove the trailing slash after :3000 to pass the full path including /api
        proxy_pass http://$backend_host:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Add basic timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
