name: brew&bloom-ci/cd

on:
  push:
    branches:
      - main
      - dev

jobs:
  Code-Quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: code-quality
        uses: actions/checkout@v4

      - name: install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: install npm
        run: |
          npm install

      - name: run test
        run: |
          npm test

      - name: rum npm audit
        run: |
          npm audit --audit-level=high
